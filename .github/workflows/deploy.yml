name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Use Bun (not npm ci) so we don't require package-lock.json to be
      # perfectly in sync with package.json — bun.lockb is the source of truth.
      - name: Install dependencies
        run: bun install

      - name: Build
        env:
          GH_PAGES: "true"
        run: bun run build

      # Ensure GitHub Pages serves 404.html for unknown routes (SPA fallback)
      - name: Copy index.html to 404.html (extra safety)
        run: cp dist/404.html dist/404.html 2>/dev/null || cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
