<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Redirecionando…</title>
    <script>
      // SPA fallback for GitHub Pages (rafgraph/spa-github-pages technique).
      // Rewrites /repo/some/route -> /repo/?/some/route so index.html loads,
      // then main.tsx restores the original path via history.replaceState.
      (function () {
        var segmentCount = 1; // repo name = 1 path segment ("eco-geo-circular-hub")
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
